<script>
(function () {
  const titles = { dashboard:'營運總覽', members:'會員管理', orders:'訂單管理', bookings:'課程預約' };

  document.querySelectorAll('.nav-item').forEach(function (button) {
    button.addEventListener('click', function () {
      const view = button.dataset.view;
      document.querySelectorAll('.nav-item').forEach(function (item) { item.classList.remove('active'); });
      document.querySelectorAll('.view').forEach(function (item) { item.classList.remove('active-view'); });
      button.classList.add('active');
      document.getElementById(view).classList.add('active-view');
      document.getElementById('pageTitle').textContent = titles[view];
      if (view === 'members') loadMembers();
      if (view === 'orders') loadOrders();
      if (view === 'bookings') loadBookings();
    });
  });

  bindForm('memberForm', 'addMember', function (result) {
    loadMembers();
    return '會員建立完成：' + result.memberId;
  });
  bindForm('orderForm', 'createOrder', function (result) {
    loadOrders();
    return '訂單建立完成：' + result.orderNumber + '，金額 NTD ' + Number(result.amount).toLocaleString('zh-TW');
  });
  bindForm('bookingForm', 'createBooking', function (result) {
    loadBookings();
    return '預約完成：' + result.bookingId + '，剩餘 ' + result.remainingHours + ' 小時';
  });

  const bookingForm = document.getElementById('bookingForm');
  bookingForm.courseDate.addEventListener('change', loadSlots);
  bookingForm.coachName.addEventListener('change', loadSlots);
  bookingForm.startTime.addEventListener('change', function () {
    const option = bookingForm.startTime.selectedOptions[0];
    document.getElementById('endTime').value = option ? option.dataset.end || '' : '';
  });

  document.getElementById('memberSearchBtn').addEventListener('click', loadMembers);
  document.getElementById('memberSearch').addEventListener('keydown', function (event) {
    if (event.key === 'Enter') loadMembers();
  });
  document.getElementById('orderStatusFilter').addEventListener('change', loadOrders);
  document.getElementById('refreshBookings').addEventListener('click', loadBookings);
  document.getElementById('orderRows').addEventListener('click', function (event) {
    const button = event.target.closest('[data-pay-order]');
    if (!button) return;
    confirmPayment(button.dataset.payOrder, button);
  });

  loadDashboard();

  function bindForm(formId, serverFunction, messageBuilder) {
    const form = document.getElementById(formId);
    form.addEventListener('submit', function (event) {
      event.preventDefault();
      const button = form.querySelector('button[type="submit"]');
      const data = Object.fromEntries(new FormData(form).entries());
      button.disabled = true;
      google.script.run
        .withSuccessHandler(function (result) {
          button.disabled = false;
          showToast(messageBuilder(result), false);
          form.reset();
          if (formId === 'bookingForm') resetSlots();
          loadDashboard();
        })
        .withFailureHandler(function (error) {
          button.disabled = false;
          showToast(errorMessage(error), true);
        })[serverFunction](data);
    });
  }

  function loadMembers() {
    const keyword = document.getElementById('memberSearch').value;
    setLoadingRow('memberRows', 7);
    google.script.run
      .withSuccessHandler(function (members) {
        const rows = members.map(function (member) {
          const name = [member.chineseName, member.englishName].filter(Boolean).join(' / ');
          return '<tr>' +
            cell(member.memberId) + cell(name) + cell(member.phone) + cell(member.memberLevel) +
            cell(member.completedHours) + cell(member.remainingHours) + cell(member.latestTransaction || '—') +
          '</tr>';
        }).join('');
        document.getElementById('memberRows').innerHTML = rows || emptyRow(7, '找不到會員資料');
      })
      .withFailureHandler(function (error) {
        document.getElementById('memberRows').innerHTML = emptyRow(7, errorMessage(error));
      })
      .searchMembers(keyword);
  }

  function loadOrders() {
    const status = document.getElementById('orderStatusFilter').value;
    setLoadingRow('orderRows', 8);
    google.script.run
      .withSuccessHandler(function (orders) {
        const rows = orders.map(function (order) {
          const statusClass = String(order.transactionStatus).toLowerCase();
          const action = order.transactionStatus === 'Pending'
            ? '<button class="table-btn" data-pay-order="' + escapeHtml(order.orderNumber) + '">確認入帳</button>'
            : '—';
          return '<tr>' + cell(order.createdAt) + cell(order.orderNumber) +
            cell((order.name || '') + '<br><small>' + escapeHtml(order.memberId) + '</small>', true) +
            cell(order.productName) + cell('NTD ' + Number(order.amount).toLocaleString('zh-TW')) +
            cell(order.paymentMethod) +
            cell('<span class="badge badge-' + escapeHtml(statusClass) + '">' + escapeHtml(order.transactionStatus) + '</span>', true) +
            cell(action, true) + '</tr>';
        }).join('');
        document.getElementById('orderRows').innerHTML = rows || emptyRow(8, '沒有符合條件的訂單');
      })
      .withFailureHandler(function (error) {
        document.getElementById('orderRows').innerHTML = emptyRow(8, errorMessage(error));
      })
      .listOrders(status);
  }

  function confirmPayment(orderNumber, button) {
    if (!window.confirm('確定訂單 ' + orderNumber + ' 已入帳？完成後會將購買時數加到會員帳戶。')) return;
    button.disabled = true;
    google.script.run
      .withSuccessHandler(function (result) {
        showToast('付款確認完成，會員剩餘時數：' + result.balanceAfter, false);
        loadOrders();
        loadDashboard();
      })
      .withFailureHandler(function (error) {
        button.disabled = false;
        showToast(errorMessage(error), true);
      })
      .markOrderPaid(orderNumber);
  }

  function loadBookings() {
    setLoadingRow('bookingRows', 7);
    google.script.run
      .withSuccessHandler(function (bookings) {
        const rows = bookings.map(function (booking) {
          const statusClass = String(booking.bookingStatus).toLowerCase();
          return '<tr>' + cell(booking.courseDate) + cell(booking.startTime + '–' + booking.endTime) +
            cell(booking.studentName) + cell(booking.memberId) + cell(booking.coachName) +
            cell(booking.totalHours) +
            cell('<span class="badge badge-' + escapeHtml(statusClass) + '">' + escapeHtml(booking.bookingStatus) + '</span>', true) + '</tr>';
        }).join('');
        document.getElementById('bookingRows').innerHTML = rows || emptyRow(7, '尚無預約紀錄');
      })
      .withFailureHandler(function (error) {
        document.getElementById('bookingRows').innerHTML = emptyRow(7, errorMessage(error));
      })
      .listBookings();
  }

  function loadSlots() {
    const date = bookingForm.courseDate.value;
    const coach = bookingForm.coachName.value;
    if (!date || !coach) return resetSlots();
    google.script.run
      .withSuccessHandler(function (slots) {
        const select = document.getElementById('startTime');
        select.innerHTML = '<option value="">請選擇時段</option>';
        slots.forEach(function (slot) {
          const option = document.createElement('option');
          option.value = slot.startTime;
          option.dataset.end = slot.endTime;
          option.textContent = slot.startTime + '–' + slot.endTime;
          select.appendChild(option);
        });
        document.getElementById('endTime').value = '';
      })
      .withFailureHandler(function (error) { showToast(errorMessage(error), true); })
      .listAvailableSlots(coach, date);
  }

  function resetSlots() {
    document.getElementById('startTime').innerHTML = '<option value="">請先選擇日期</option>';
    document.getElementById('endTime').value = '';
  }

  function loadDashboard() {
    google.script.run
      .withSuccessHandler(function (data) {
        document.getElementById('memberCount').textContent = data.memberCount;
        document.getElementById('pendingOrders').textContent = data.pendingOrders;
        document.getElementById('todayBookings').textContent = data.todayBookings;
        document.getElementById('monthlyRevenue').textContent = 'NTD ' + Number(data.monthlyRevenue).toLocaleString('zh-TW');
      })
      .withFailureHandler(function () {
        ['memberCount','pendingOrders','todayBookings','monthlyRevenue'].forEach(function (id) { document.getElementById(id).textContent = '—'; });
      })
      .getDashboardSummary();
  }

  function cell(value, trusted) {
    return '<td>' + (trusted ? String(value || '') : escapeHtml(value)) + '</td>';
  }
  function emptyRow(columns, message) {
    return '<tr><td class="empty-row" colspan="' + columns + '">' + escapeHtml(message) + '</td></tr>';
  }
  function setLoadingRow(target, columns) {
    document.getElementById(target).innerHTML = emptyRow(columns, '資料載入中…');
  }
  function escapeHtml(value) {
    return String(value === undefined || value === null ? '' : value)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
  }
  function errorMessage(error) {
    return error && error.message ? error.message : '操作失敗';
  }
  function showToast(message, isError) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.toggle('error', Boolean(isError));
    toast.classList.add('show');
    window.clearTimeout(showToast.timer);
    showToast.timer = window.setTimeout(function () { toast.classList.remove('show'); }, 3600);
  }
})();
</script>
