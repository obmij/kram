<script>
(function () {
  const rows = document.getElementById('bookingRows');
  const refresh = document.getElementById('refreshBookings');
  if (rows && refresh) initBookingActions_();
  initHealth_();

  function initBookingActions_() {
    let rendering = false;
    let scheduled = false;

    document.querySelectorAll('[data-view="bookings"]').forEach(function (button) {
      button.addEventListener('click', scheduleRender_);
    });
    refresh.addEventListener('click', scheduleRender_);
    rows.addEventListener('click', function (event) {
      const completeButton = event.target.closest('[data-complete-booking]');
      if (completeButton) {
        complete_(completeButton.dataset.completeBooking, completeButton);
        return;
      }
      const cancelButton = event.target.closest('[data-cancel-booking]');
      if (cancelButton) cancel_(cancelButton.dataset.cancelBooking, cancelButton);
    });

    const observer = new MutationObserver(function () {
      if (rendering) return;
      const firstDataRow = rows.querySelector('tr:not(:has(.empty-row))');
      if (firstDataRow && firstDataRow.children.length < 8) scheduleRender_();
    });
    observer.observe(rows, { childList: true, subtree: true });

    function scheduleRender_() {
      if (scheduled) return;
      scheduled = true;
      window.setTimeout(function () {
        scheduled = false;
        render_();
      }, 80);
    }

    function render_() {
      rendering = true;
      google.script.run
        .withSuccessHandler(function (bookings) {
          const html = bookings.map(function (booking) {
            const status = String(booking.bookingStatus || '');
            const statusClass = status.toLowerCase();
            let action = '—';

            if (status === 'Confirmed') {
              action = '<div class="table-actions">' +
                '<button type="button" class="table-btn" data-complete-booking="' + escape_(booking.bookingId) + '">完成課程</button>' +
                '<button type="button" class="table-btn table-btn-danger" data-cancel-booking="' + escape_(booking.bookingId) + '">取消預約</button>' +
              '</div>';
            } else if (status === 'Completed') {
              action = booking.completedAt
                ? '<span class="action-note">完成：' + escape_(booking.completedAt) + '</span>'
                : '已完成';
            } else if (status === 'Cancelled') {
              const details = [booking.cancelledAt, booking.cancelReason].filter(Boolean).map(escape_).join('｜');
              action = details ? '<span class="action-note">' + details + '</span>' : '已取消';
            }

            return '<tr>' +
              cell_(booking.courseDate) +
              cell_(booking.startTime + '–' + booking.endTime) +
              cell_(booking.studentName) +
              cell_(booking.memberId) +
              cell_(booking.coachName) +
              cell_(booking.totalHours) +
              '<td><span class="badge badge-' + escape_(statusClass) + '">' + escape_(status) + '</span></td>' +
              '<td>' + action + '</td>' +
            '</tr>';
          }).join('');
          rows.innerHTML = html || '<tr><td class="empty-row" colspan="8">尚無預約紀錄</td></tr>';
          rendering = false;
        })
        .withFailureHandler(function (error) {
          rows.innerHTML = '<tr><td class="empty-row" colspan="8">' + escape_(error && error.message ? error.message : '無法載入預約紀錄') + '</td></tr>';
          rendering = false;
        })
        .listBookings();
    }

    function complete_(bookingId, button) {
      if (!window.confirm('確定此課程已完成？完成後會增加會員的已上時數。')) return;
      button.disabled = true;
      google.script.run
        .withSuccessHandler(function (result) {
          window.alert('課程已完成，會員累計已上時數：' + result.completedHours);
          render_();
          refreshDashboard_();
        })
        .withFailureHandler(function (error) {
          button.disabled = false;
          window.alert(error && error.message ? error.message : '操作失敗');
        })
        .completeBooking(bookingId);
    }

    function cancel_(bookingId, button) {
      const reason = window.prompt('請輸入取消原因。取消後會立即退回會員時數：', '學員取消');
      if (reason === null) return;
      if (!String(reason).trim()) {
        window.alert('必須填寫取消原因');
        return;
      }
      if (!window.confirm('確定取消預約 ' + bookingId + '？會員時數將立即退回。')) return;

      button.disabled = true;
      google.script.run
        .withSuccessHandler(function (result) {
          window.alert('預約已取消，退回 ' + result.returnedHours + ' 小時；會員剩餘 ' + result.remainingHours + ' 小時。');
          render_();
          refreshDashboard_();
        })
        .withFailureHandler(function (error) {
          button.disabled = false;
          window.alert(error && error.message ? error.message : '取消預約失敗');
        })
        .cancelBooking(bookingId, String(reason).trim());
    }
  }

  function refreshDashboard_() {
    google.script.run
      .withSuccessHandler(function (data) {
        const values = {
          memberCount: data.memberCount,
          pendingOrders: data.pendingOrders,
          todayBookings: data.todayBookings,
          monthlyRevenue: 'NTD ' + Number(data.monthlyRevenue).toLocaleString('zh-TW')
        };
        Object.keys(values).forEach(function (id) {
          const target = document.getElementById(id);
          if (target) target.textContent = values[id];
        });
      })
      .getDashboardSummary();
  }

  function initHealth_() {
    const dashboard = document.getElementById('dashboard');
    if (!dashboard || document.getElementById('runHealthCheck')) return;

    const style = document.createElement('style');
    style.textContent = '.health-summary{padding:14px 16px;border-radius:14px;background:#f8fafc;color:#475467;font-weight:800;margin-bottom:16px}.health-ok{background:#dcfce7;color:#166534}.health-fail{background:#fee2e2;color:#991b1b}.health-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.health-item{display:grid;gap:5px;padding:14px;border:1px solid #e5e7eb;border-radius:14px;background:#fff}.health-item span{font-size:13px;color:#667085;word-break:break-word}.health-item-ok{border-left:4px solid #22c55e}.health-item-fail{border-left:4px solid #ef4444}@media(max-width:640px){.health-grid{grid-template-columns:1fr}}';
    document.head.appendChild(style);

    const panel = document.createElement('article');
    panel.className = 'panel';
    panel.innerHTML = '<div class="panel-head"><div><p class="eyebrow">System Health</p><h2>系統健康檢查</h2></div><button type="button" class="secondary-btn" id="runHealthCheck">執行檢查</button></div><div id="healthSummary" class="health-summary">尚未執行檢查</div><div id="healthChecks" class="health-grid"></div>';
    dashboard.appendChild(panel);

    document.getElementById('runHealthCheck').addEventListener('click', function () {
      const button = this;
      const summary = document.getElementById('healthSummary');
      const checks = document.getElementById('healthChecks');
      button.disabled = true;
      summary.className = 'health-summary';
      summary.textContent = '檢查中…';
      checks.innerHTML = '';

      google.script.run
        .withSuccessHandler(function (result) {
          button.disabled = false;
          summary.className = 'health-summary ' + (result.success ? 'health-ok' : 'health-fail');
          summary.textContent = result.success ? '系統檢查通過｜' + result.checkedAt : '發現 ' + result.failedCount + ' 項異常｜' + result.checkedAt;
          checks.innerHTML = result.checks.map(function (check) {
            return '<div class="health-item ' + (check.passed ? 'health-item-ok' : 'health-item-fail') + '"><strong>' + escape_(check.name) + '</strong><span>' + escape_(check.detail) + '</span></div>';
          }).join('');
        })
        .withFailureHandler(function (error) {
          button.disabled = false;
          summary.className = 'health-summary health-fail';
          summary.textContent = error && error.message ? error.message : '系統檢查失敗';
        })
        .runSystemSelfCheck();
    });
  }

  function cell_(value) {
    return '<td>' + escape_(value) + '</td>';
  }

  function escape_(value) {
    return String(value === undefined || value === null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }
})();
</script>
